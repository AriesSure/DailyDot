version: "3.8"

volumes:
  mysql_data:
  redis_data:

services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: dailydot
      MYSQL_USER: dailydot
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dailydot_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Message broker ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Flask application ─────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: mysql+pymysql://dailydot:${MYSQL_PASSWORD:-dailydot_pass}@db:3306/dailydot
      REDIS_URL: redis://redis:6379/0
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - card_images:/app/app/static/cards

  # ── Celery worker (optional, for scheduled reports) ───────
  celery-worker:
    build: .
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: mysql+pymysql://dailydot:${MYSQL_PASSWORD:-dailydot_pass}@db:3306/dailydot
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  card_images:
