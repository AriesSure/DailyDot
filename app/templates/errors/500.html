{% extends "base.html" %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center bg-white rounded-xl shadow-lg p-12 max-w-md">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-exclamation-circle text-red-600 text-3xl"></i>
        </div>
        <h1 class="text-4xl font-bold text-gray-800 mb-2">500</h1>
        <h2 class="text-xl text-gray-600 mb-4">Server Error</h2>
        <p class="text-gray-500 mb-8">Something went wrong on our end. Please try again later or contact support if the problem persists.</p>
        <a href="{{ url_for('home') }}" class="inline-flex items-center bg-gradient-to-r from-blue-500 to-blue-600 text-white px-6 py-3 rounded-lg hover:from-blue-600 hover:to-blue-700 transition-all duration-300 shadow-md">
            <i class="fas fa-home mr-2"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
